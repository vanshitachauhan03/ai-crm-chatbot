<!DOCTYPE html>
<html>
<head>
    <title>AI CRM Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #ece5dd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: #fff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #dcf8c6;
            align-self: flex-end;
        }

        .bot {
            background: #f1f0f0;
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #075e54;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">CRM AI Chatbot</div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-box">
        <input type="text" id="message" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(message, type) {
    let chatBox = document.getElementById("chat-box");

    let msgDiv = document.createElement("div");
    msgDiv.classList.add("message", type);
    msgDiv.innerText = message;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    let input = document.getElementById("message");
    let message = input.value;

    if(message.trim() === "") return;

    addMessage(message, "user");

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");
    });

    input.value = "";
}
</script>

</body>
</html>
